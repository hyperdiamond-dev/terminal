# Terminal CI — format check, lint, type check, and build

name: Terminal

on:
  push:
    branches: ["main", "**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    env:
      API_BASE_URL: http://localhost:8000

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@61fe2df320078202e33d7d5ad347e7dcfa0e8f31 # v1.1.2
        with:
          deno-version: 2.5.1

      - name: Check format, lint, and types
        run: deno task check

      - name: Build
        run: deno task build
